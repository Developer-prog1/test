name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Prisma schema requires DATABASE_URL; generate does not connect to the DB.
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/gymhub
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install
      - run: pnpm db:generate
      - run: pnpm --filter api build
      - run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
