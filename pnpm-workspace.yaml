packages:
  - "apps/*"
  - "packages/*"

shamefullyHoist: true
autoInstallPeers: true
confirmModulesPurge: false

allowBuilds:
  "@nestjs/core": true
  "@parcel/watcher": true
  "@prisma/client": true
  "@prisma/engines": true
  "@scarf/scarf": true
  "@swc/core": true
  argon2: true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
